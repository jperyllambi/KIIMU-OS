KIIMU Dark:
  modes:
    light: false

  # Base
  primary-background-color: "#090909"
  secondary-background-color: "#111111"
  card-background-color: "#171717"

  # Text
  primary-text-color: "#FFFFFF"
  secondary-text-color: "#A1A1AA"
  text-primary-color: "#FFFFFF"
  text-medium-color: "#A1A1AA"
  disabled-text-color: "#6B7280"

  # Accent
  primary-color: "#3B82F6"
  accent-color: "#3B82F6"
  success-color: "#22C55E"
  warning-color: "#FACC15"
  error-color: "#EF4444"

  # Cards
  ha-card-background: "rgba(23,23,23,0.72)"
  ha-card-border-radius: "28px"
  ha-card-border-width: "1px"
  ha-card-border-color: "rgba(255,255,255,0.08)"
  ha-card-box-shadow: "0px 8px 32px rgba(0,0,0,0.35)"

  # Header
  app-header-background-color: "rgba(9,9,9,0.70)"
  app-header-text-color: "#FFFFFF"

  # Sidebar
  sidebar-background-color: "#090909"
  sidebar-text-color: "#A1A1AA"
  sidebar-selected-background-color: "#171717"
  sidebar-selected-text-color: "#FFFFFF"

  # Icons
  state-icon-color: "#A1A1AA"
  state-icon-active-color: "#FACC15"

  # Switches
  switch-checked-color: "#3B82F6"
  switch-unchecked-color: "#444444"

  # Sliders
  slider-color: "#3B82F6"

  # Buttons
  paper-item-icon-active-color: "#3B82F6"

  # Dividers
  divider-color: "rgba(255,255,255,0.08)"

  # Dialogs
  dialog-background-color: "#171717"

  # Inputs
  input-fill-color: "#1F1F1F"
  input-disabled-fill-color: "#121212"

  # Chips
  chip-background-color: "rgba(255,255,255,0.06)"

  # Custom variables for Card Mod / Button Card
  kiimu-spacing: "16px"
  kiimu-radius: "28px"
  kiimu-radius-small: "18px"
  kiimu-blur: "18px"
  kiimu-transition: "250ms"
  kiimu-surface: "rgba(23,23,23,0.72)"
  kiimu-surface-hover: "rgba(36,36,36,0.85)"
  kiimu-border: "rgba(255,255,255,0.08)"
  kiimu-primary: "#3B82F6"
  kiimu-success: "#22C55E"
  kiimu-warning: "#FACC15"
  kiimu-danger: "#EF4444"
