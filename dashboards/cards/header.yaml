type: custom:mod-card
card_mod:
  style: |
    ha-card {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 8px 8px 24px 8px;
    }

card:
  type: vertical-stack
  cards:

    - type: markdown
      content: >
        {% set h = now().hour %}
        {% if h < 6 %}
        # 🌙 Buenas noches, Quim
        {% elif h < 12 %}
        # ☀️ Buenos días, Quim
        {% elif h < 20 %}
        # 👋 Buenas tardes, Quim
        {% else %}
        # 🌙 Buenas noches, Quim
        {% endif %}

        Bienvenido a **KIIMU OS**

      card_mod:
        style: |
          ha-card{
            background:none;
            box-shadow:none;
            border:none;
            padding-bottom:4px;
          }
          ha-markdown{
            color:white;
          }

    - type: horizontal-stack
      cards:

        - type: custom:mushroom-template-card
          primary: >
            {{ states('weather.forecast_casa')|capitalize }}
          secondary: >
            {{ state_attr('weather.forecast_casa','temperature') }} °C
          icon: mdi:weather-partly-cloudy
          icon_color: blue
          layout: horizontal

        - type: custom:mushroom-template-card
          primary: >
            {{ states.light
              | selectattr('state','eq','on')
              | list
              | count }} luces
          secondary: Encendidas
          icon: mdi:lightbulb-group
          icon_color: amber
          layout: horizontal

        - type: custom:mushroom-template-card
          primary: >
            {% if is_state('binary_sensor.internet','on') %}
            Online
            {% else %}
            Offline
            {% endif %}
          secondary: Sistema
          icon: mdi:server
          icon_color: green
          layout: horizontal
