type: horizontal-stack

cards:

  - type: custom:button-card
    icon: mdi:home-variant
    name: Inicio
    tap_action:
      action: navigate
      navigation_path: /lovelace/home
    styles:
      card:
        - border-radius: 999px
        - height: 58px
        - background: rgba(23,23,23,0.72)
        - border: 1px solid rgba(255,255,255,0.08)
      icon:
        - color: var(--primary-text-color)
      name:
        - color: var(--primary-text-color)
        - font-size: 13px

  - type: custom:button-card
    icon: mdi:sofa
    name: Salón
