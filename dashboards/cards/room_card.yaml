type: custom:button-card
template: kiimu_room_v2

variables:
  room_name: "Salón"
  entity: light.salon_salon_2
  icon: mdi:sofa
  popup_id: salon

name: |
  [[[ return variables.room_name ]]]

entity: |
  [[[ return variables.entity ]]]

icon: |
  [[[ return variables.icon ]]]

show_name: true
show_icon: true
show_label: true
show_state: false

label: |
  [[[
    const area = variables.room_name.toLowerCase();

    const lights = Object.values(states)
      .filter(e =>
        e.entity_id.startsWith("light.") &&
        e.entity_id.includes(area.replace(" ","_")) &&
        e.state === "on"
      ).length;

    return lights + " luces encendidas";
  ]]]

custom_fields:

  badge: |
    [[[
      const on = entity.state === "on";

      return `
      <div style="
      padding:6px 12px;
      border-radius:999px;
      background:${on ? "rgba(59,130,246,.18)" : "rgba(255,255,255,.06)"};
      color:white;
      font-weight:600;
      font-size:12px;">
      ${on ? "ACTIVO" : "OFF"}
      </div>`;
    ]]]

styles:

  grid:
    - grid-template-areas: '"i badge" "n n" "l l"'
    - grid-template-columns: 1fr auto
    - grid-template-rows: auto auto auto

  card:
    - height: 220px
    - border-radius: 32px
    - padding: 24px
    - border: 1px solid rgba(255,255,255,.08)
    - transition: all .25s ease
    - background: |
        [[[
          if(entity.state=="on")
            return "linear-gradient(145deg,#3B82F6,#1d4ed8)";
          return "rgba(23,23,23,.72)";
        ]]]
    - backdrop-filter: blur(30px)
    - box-shadow: 0px 12px 40px rgba(0,0,0,.30)

  icon:
    - width: 52px
    - color: |
        [[[
          return entity.state=="on" ? "#ffffff" : "#A1A1AA";
        ]]]

  name:
    - color: white
    - font-size: 24px
    - font-weight: 700

  label:
    - color: rgba(255,255,255,.72)
    - font-size: 14px

  custom_fields:
    badge:
      - justify-self: end

tap_action:
  action: fire-dom-event
  browser_mod:
    service: browser_mod.popup
    data:
      title: |
        [[[ return variables.room_name ]]]
      size: wide
      content:
        type: vertical-stack
        cards:

          - type: custom:mushroom-light-card
            entity: |
              [[[ return variables.entity ]]]
            show_brightness_control: true
            show_color_temp_control: true
            show_color_control: true

          - type: entities
            entities:
              - |
                [[[ return variables.entity ]]]
