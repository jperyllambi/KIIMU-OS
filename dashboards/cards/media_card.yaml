type: vertical-stack

cards:

  - type: custom:mushroom-media-player-card
    entity: media_player.spotify
    name: Spotify
    use_media_info: true
    show_volume_level: true
    fill_container: true
    media_controls:
      - play_pause_stop
      - previous
      - next

  - type: custom:mini-media-player
    entity: media_player.spotify
    artwork: full-cover
    hide:
      power: true
      source: true
      icon: false
      volume: false
    shortcuts:
      columns: 4
      buttons:
        - name: Chill
          type: service
          id: script.chill
        - name: Focus
          type: service
          id: script.focus
        - name: House
          type: service
          id: script.house
        - name: Techno
          type: service
          id: script.techno

card_mod:
  style: |
    ha-card {
      border-radius: 30px;
      background: rgba(23,23,23,0.72);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      padding: 8px;
    }
